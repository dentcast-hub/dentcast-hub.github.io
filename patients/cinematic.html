  <!-- Vazirmatn (same faces as the main site) -->
  <style>
  @font-face{ font-family:'Vazirmatn'; src:url('/fonts/Vazirmatn[wght].woff2') format('woff2'); font-weight:100 900; font-display:swap; }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; background:#000; }
  body{ font-family:'Vazirmatn',system-ui,sans-serif; }

  /* Full-viewer scroll container (mirrors the mobile #mobile-body scroller).
     dvh (with svh fallback) tracks the live viewport so no gap opens when a
     mobile browser's URL bar collapses. */
  #sc-body{
    height:100svh; height:100dvh; overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch; background:#000;
  }

  /* =====================================================
     CINEMATIC PATIENTS — desktop full-viewer (no capsule)
     Same frames / scenes / speed as the mobile experience.
     The 0→1 scroll distance is (track − sticky) = 3200px, identical
     to mobile, so the playback speed is unchanged.
  ===================================================== */
  .pt-wrap{ position:relative; margin:0; }
  .pt-track{ position:relative; height:calc(100svh + 3200px); height:calc(100dvh + 3200px); }
  .pt-sticky{
    position:sticky; top:0;
    height:100svh; height:100dvh; width:100%;
    overflow:hidden; background:#000;
    z-index:10;
  }
  /* canvas — sized to the viewer in JS, cover-fit (fills, never distorts) */
  #pt-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* gradient overlays */
  .pt-grad-top{
    position:absolute; top:0; left:0; right:0; height:52%;
    background:linear-gradient(to bottom,rgba(0,0,0,.72) 0%,rgba(0,0,0,.28) 55%,transparent 100%);
    pointer-events:none; z-index:2;
  }
  .pt-grad-bottom{
    position:absolute; bottom:0; left:0; right:0; height:68%;
    background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.50) 42%,transparent 100%);
    pointer-events:none; z-index:2; opacity:0;
  }
  .pt-vignette{
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.28) 100%);
    pointer-events:none; z-index:2;
  }
  /* progress circuit — a PCB-style trace beside the film. The path is built in
     JS to the rail's real pixel height (crisp 45° elbows, no viewBox stretch);
     the lit run is animated with stroke-dashoffset and a glowing signal dot
     rides the trace via getPointAtLength. Four solder-pad nodes (tooth /
     headphones / book / phone) light up as the story reaches each scene. */
  .pt-circuit{
    position:absolute;
    top:calc(16px + env(safe-area-inset-top,0px)); right:2px;
    width:22px;
    height:calc(100% - 32px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));
    z-index:20; pointer-events:none;
  }
  .pt-circuit svg{ display:block; width:22px; overflow:visible; }
  .pt-trace-stubs{ fill:none; stroke:rgba(255,255,255,.10); stroke-width:1.4; }
  .pt-via{ fill:rgba(255,255,255,.14); }
  .pt-trace-base{ fill:none; stroke:rgba(255,255,255,.14); stroke-width:1.6; stroke-linejoin:round; }
  .pt-trace-lit{
    fill:none; stroke:rgba(214,230,255,.95); stroke-width:1.6; stroke-linejoin:round;
    filter:drop-shadow(0 0 3px rgba(170,200,255,.8));
    will-change:stroke-dashoffset;
  }
  .pt-signal{ fill:#fff; filter:drop-shadow(0 0 6px rgba(190,215,255,.95)); opacity:0; transition:opacity .25s ease; }
  .pt-node-bg{ fill:rgba(8,12,22,.62); }
  .pt-node-ring{ fill:none; stroke:rgba(255,255,255,.30); stroke-width:1.3; transition:stroke .3s ease; }
  .pt-node-ico{
    stroke:rgba(255,255,255,.42); fill:none;
    stroke-width:1.3; stroke-linecap:round; stroke-linejoin:round;
    transition:stroke .3s ease;
  }
  .pt-node-scale{
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    transform-box:fill-box; transform-origin:center;
  }
  .pt-node.on .pt-node-ring{ stroke:rgba(255,255,255,.9); }
  .pt-node.on .pt-node-ico{ stroke:#fff; }
  .pt-node.on{ filter:drop-shadow(0 0 5px rgba(170,200,255,.65)); }
  .pt-node.cur .pt-node-scale{ transform:scale(1.3); }
  .pt-node-halo{ fill:none; stroke:rgba(190,215,255,0); transform-box:fill-box; transform-origin:center; }
  .pt-node.cur .pt-node-halo{ animation:ptHalo .7s ease-out both; }
  @keyframes ptHalo{
    0%{ transform:scale(.6); stroke:rgba(190,215,255,.7); }
    100%{ transform:scale(1.9); stroke:rgba(190,215,255,0); }
  }
  @media (prefers-reduced-motion:reduce){
    .pt-node-scale,.pt-node-ring,.pt-node-ico{ transition:none; }
    .pt-node.cur .pt-node-halo{ animation:none; }
  }

  /* scenes — shared base. On the wide viewer the interactive content sits in a
     centered column over the full-bleed cinematic background. */
  .pt-scene{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none; z-index:5;
    will-change:opacity,transform;
  }
  .pt-scene > *{ width:100%; max-width:480px; }

  /* scene: hero */
  .pt-scene-hero{ justify-content:flex-start; padding:34px 20px 0; }
  .pt-hero-tagline{
    color:#fff; font-size:1.55rem; font-weight:900; letter-spacing:-.01em;
    text-shadow:0 2px 20px rgba(0,0,0,.65),0 1px 4px rgba(0,0,0,.45);
    line-height:1.25; text-align:center; margin-bottom:14px;
  }
  .pt-scroll-hint{ display:flex; flex-direction:column; align-items:center; gap:6px; will-change:opacity; }
  .pt-hint-text{
    font-size:.86rem; font-weight:800; color:rgba(255,255,255,.88);
    letter-spacing:.04em; text-shadow:0 1px 10px rgba(0,0,0,.5);
  }
  .pt-hint-ico{
    font-size:1.55rem; color:rgba(255,255,255,.90);
    animation:pt-bounce .95s ease-in-out infinite; display:block; line-height:1;
    text-shadow:0 2px 12px rgba(0,0,0,.45);
  }
  @keyframes pt-bounce{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(5px); } }

  /* doctor identity — parallax layer, slides up with scroll */
  .pt-hero-bottom{
    position:absolute; bottom:32px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center;
    padding:0 24px; z-index:6; will-change:transform; pointer-events:none;

  .pt-hero-name{
    color:#fff; font-size:1.28rem; font-weight:900; letter-spacing:-.01em;

    line-height:1.2; text-align:center;

  .pt-hero-divider{ width:24px; height:1.5px; background:rgba(255,255,255,.35); border-radius:999px; margin:8px auto; }
  .pt-hero-spec{
    color:rgba(255,255,255,.62); font-size:.80rem; font-weight:600; letter-spacing:.03em;
    text-shadow:0 1px 8px rgba(0,0,0,.40); text-align:center;

  /* scene: knowledge (litecast cards) */
  .pt-scene-knowledge{ justify-content:flex-start; padding:28px 20px 0; gap:0; }

  .pt-lc-card{

    will-change:opacity,transform;
    box-shadow:0 4px 28px rgba(0,0,0,.22),0 1px 6px rgba(0,0,0,.18);
    -webkit-tap-highlight-color:transparent;

  }
  .pt-lc-card:hover{ background:rgba(255,255,255,.15); }
  .pt-lc-card-cat{ font-size:.62rem; font-weight:700; color:rgba(255,255,255,.48); letter-spacing:.09em; text-transform:uppercase; }
  .pt-lc-card-title{ font-size:.94rem; font-weight:800; color:#fff; line-height:1.40; text-shadow:0 1px 6px rgba(0,0,0,.28); }

  /* scene: articles */
  .pt-scene-articles{ justify-content:flex-start; padding:28px 20px 0; }
  .pt-articles-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:7px; width:100%; }
  .pt-article-item{ opacity:0; transform:translateX(14px) scale(.97); will-change:opacity,transform; }
  .pt-article-item a{
    display:flex; align-items:center; gap:11px; padding:13px 15px;
    background:rgba(255,255,255,.09);
    backdrop-filter:blur(20px) saturate(1.5); -webkit-backdrop-filter:blur(20px) saturate(1.5);
    border:1px solid rgba(255,255,255,.16); border-radius:14px;
    text-decoration:none; -webkit-tap-highlight-color:transparent;
    transition:background .25s ease;
  }
  .pt-article-item a:hover{ background:rgba(255,255,255,.15); }
  .pt-article-dot{ width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.48); flex-shrink:0; }
  .pt-article-title{ font-size:.88rem; font-weight:700; color:#fff; line-height:1.42; text-shadow:0 1px 4px rgba(0,0,0,.28); }

  /* scene: CTA — decision mode */
  .pt-scene-cta{ justify-content:flex-end; padding:0 20px calc(28px + env(safe-area-inset-bottom,0px)); }
  .pt-cta-tagline{ font-size:.82rem; font-weight:600; color:rgba(255,255,255,.62); text-align:center; margin-bottom:5px; letter-spacing:.02em; }
  .pt-cta-name{ font-size:1.18rem; font-weight:900; color:#fff; text-align:center; margin-bottom:18px; text-shadow:0 2px 14px rgba(0,0,0,.55); letter-spacing:-.01em; }
  .pt-cta-actions{ display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; }
  .pt-cta-btn{
    display:flex; align-items:center; justify-content:center; gap:7px;

  }
  .pt-cta-btn:active{ transform:scale(.96); }

  .pt-btn-ico{ font-size:1.05rem; line-height:1; display:inline-flex; }
  .pt-btn-ico svg{ width:1em; height:1em; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  @media (prefers-reduced-motion: reduce){
    .pt-hint-ico{ animation:none; }
  }

<script>
/* ── CINEMATIC PATIENTS — data loader (same feed/shape as the mobile site) ── */
(function(){
  'use strict';
  const FEED_URL='/litecast/lite-glossary.json';
  function shuffle(arr,n){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,Math.min(n,a.length));}
  fetch(FEED_URL,{cache:'no-store'})
    .then(r=>r.ok?r.json():Promise.reject())
    .then(json=>{
      const items=Array.isArray(json.LightGlossary)?json.LightGlossary:[];
      if(!items.length) return;
      const picked=shuffle(items,6);
      const lcBox=document.getElementById('pt-lc-cards');
      if(lcBox){
        lcBox.innerHTML='';
        picked.slice(0,3).forEach(it=>{
          const a=document.createElement('a');
          a.className='pt-lc-card';
          a.href='/'+(it.page_url||'litecast/');
          a.innerHTML='<span class="pt-lc-card-cat">LiteCast · بیماران</span><span class="pt-lc-card-title">'+it.title+'</span>';
          lcBox.appendChild(a);
        });
      }
      const artBox=document.getElementById('pt-articles-list');
      if(artBox){
        artBox.innerHTML='';
        picked.slice(3,6).forEach(it=>{
          const li=document.createElement('li');
          li.className='pt-article-item';
          const a=document.createElement('a');
          a.href='/'+(it.page_url||'litecast/');
          a.innerHTML='<span class="pt-article-dot"></span><span class="pt-article-title">'+it.title+'</span>';
          li.appendChild(a);
          artBox.appendChild(li);
        });
      }
    })
    .catch(()=>{});
})();
</script>

<script>
/* ── CINEMATIC PATIENTS — desktop full-viewer scroll engine ──
   Same frames (277), same easing, same scene timing as the mobile engine.
   Differences vs mobile: scrolls the page's own #sc-body, the sticky fills the
   whole viewer (no capsule), the canvas backing store tracks the viewer size so
   the portrait frames cover-fit without distortion, and there is no panel-active
   gate (this page is always the patients experience). */
(function(){
  'use strict';
  const FRAME_COUNT = 277;

  const track     = document.getElementById('pt-track');
  const sticky    = document.getElementById('pt-sticky');
  const canvas    = document.getElementById('pt-canvas');
  const gradBot   = document.getElementById('pt-grad-bottom');
  const heroScene = document.getElementById('pt-scene-hero');
  const lcScene   = document.getElementById('pt-scene-knowledge');
  const artScene  = document.getElementById('pt-scene-articles');
  const ctaScene  = document.getElementById('pt-scene-cta');
  const hintEl    = document.getElementById('pt-scroll-hint');
  const heroBot   = document.getElementById('pt-hero-bottom');
  const body      = document.getElementById('sc-body');
  const circEl    = document.getElementById('pt-circuit');
  const circSvg   = document.getElementById('pt-circuit-svg');
  const stubsPath = document.getElementById('pt-trace-stubs');
  const viasEl    = document.getElementById('pt-vias');
  const basePath  = document.getElementById('pt-trace-base');
  const litPath   = document.getElementById('pt-trace-lit');
  const signalEl  = document.getElementById('pt-signal');
  const nodeEls   = [0,1,2,3].map(function(i){ return document.getElementById('pt-node-'+i); });
  /* circuit chapter anchors = the scroll fraction where each scene is fully on */
  const CHAPTERS  = [0, 0.27, 0.60, 0.94];
  let railH = 0;

  if(!track || !canvas || !body || !sticky) return;

  const ctx = canvas.getContext('2d');

  /* cover-fit draw — fills the canvas backing store, cropping the overflow */
  function drawFrame(img){
    if(!img || !img.naturalWidth) return;
    const cw=canvas.width, ch=canvas.height;
    const scale=Math.max(cw/img.naturalWidth, ch/img.naturalHeight);
    /* Vertical focus of the cover crop: 0 = anchor to the top of the frame,
       0.5 = centered. Biased above center so the top of the shot stays
       visible on wide desktop viewers (where the portrait frame overflows
       a lot vertically) — without the dead space full top-anchoring caused.
       Lower it toward 0 to reveal more top, raise toward 0.5 for center. */
    const VFOCUS=0.30;
    const dx=(cw-img.naturalWidth*scale)/2;
    const dy=(ch-img.naturalHeight*scale)*VFOCUS;
    ctx.drawImage(img,dx,dy,img.naturalWidth*scale,img.naturalHeight*scale);
  }

  /* size the canvas backing store to the viewer (capped DPR for sharpness) */
  function resize(){
    const r=sticky.getBoundingClientRect();
    const dpr=Math.min(window.devicePixelRatio||1, 2);
    canvas.width  = Math.max(1, Math.round(r.width  * dpr));
    canvas.height = Math.max(1, Math.round(r.height * dpr));
    railH = circEl ? circEl.clientHeight : 0;
    buildCircuit();
    const f=frames[lastIdx>=0?lastIdx:0];
    if(f&&f.complete&&f.naturalWidth){ ctx.clearRect(0,0,canvas.width,canvas.height); drawFrame(f); }
  }

  /* build the PCB trace to the rail's real pixel height: a vertical spine that
     elbows 45° left/right between the 4 solder-pad nodes, plus a few dead-end
     stubs with via dots for the board feel. nodeLen[] maps each node to its
     true arc length so the lit run and the signal dot hit pads dead-on. */
  let totLen=0, nodeLen=[0,0,0,0];
  function buildCircuit(){
    if(!circSvg||!basePath||!litPath) return;
    const H=Math.round(railH);
    if(H<140) return;
    const AX=11, J=5, INS=12, G=12;
    circSvg.setAttribute('viewBox','0 0 22 '+H);
    circSvg.setAttribute('height',H);
    const ys=CHAPTERS.map(function(c){ return INS+c*(H-2*INS); });
    let d='M'+AX+' '+ys[0], sd='', len=0;
    nodeLen=[0];
    if(viasEl) viasEl.innerHTML='';
    for(let i=0;i<3;i++){
      const dir=(i%2===0)?1:-1, x=AX+dir*J, y1=ys[i], y2=ys[i+1];
      d+=' L'+AX+' '+(y1+G)
       + ' L'+x +' '+(y1+G+J)
       + ' L'+x +' '+(y2-G-J)
       + ' L'+AX+' '+(y2-G)
       + ' L'+AX+' '+y2;
      len+=(y2-y1)+2*J*(Math.SQRT2-1);
      nodeLen.push(len);
      const ym=Math.round((y1+y2)/2), bx=x-dir*8;
      sd+='M'+x+' '+ym+' L'+bx+' '+ym+' ';
      if(viasEl){
        const v=document.createElementNS('http://www.w3.org/2000/svg','circle');
        v.setAttribute('class','pt-via');
        v.setAttribute('cx',bx); v.setAttribute('cy',ym); v.setAttribute('r','1.6');
        viasEl.appendChild(v);
      }
    }
    basePath.setAttribute('d',d);
    litPath.setAttribute('d',d);
    if(stubsPath) stubsPath.setAttribute('d',sd);
    totLen=litPath.getTotalLength();
    const k=len>0?totLen/len:1;
    for(let i=0;i<nodeLen.length;i++) nodeLen[i]*=k;
    litPath.style.strokeDasharray=totLen+' '+totLen;
    nodeEls.forEach(function(n,i){ if(n) n.setAttribute('transform','translate('+AX+' '+ys[i]+')'); });
  }

  /* preload all frames */
  const frames=[];
  for(let i=1;i<=FRAME_COUNT;i++){
    const img=new Image();
    img.src='/patients/frames/f'+String(i).padStart(3,'0')+'.webp';
    img.onload=function(){ if(i===1){ resize(); } };
    frames.push(img);
  }

  /* helpers (identical to the mobile engine) */
  function rng(p,a,b){ return Math.max(0,Math.min(1,(p-a)/(b-a))); }
  function ease(t){ return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
  function setO(el,v){ if(el) el.style.opacity=v; }
  function setPE(el,on){ if(el) el.style.pointerEvents=on?'auto':'none'; }

  if(heroScene){ heroScene.style.opacity='1'; heroScene.style.pointerEvents='auto'; }

  let lastIdx=-1, ticking=false;

  function update(){
    ticking=false;

    const total=track.offsetHeight-body.clientHeight;
    if(total<=0) return;
    const bRect=body.getBoundingClientRect();
    const tRect=track.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(bRect.top-tRect.top)/total));

    /* === FRAMES === */
    const idx=Math.round(p*(FRAME_COUNT-1));
    if(idx!==lastIdx){
      lastIdx=idx;
      const f=frames[idx];
      if(f&&f.complete&&f.naturalWidth){ ctx.clearRect(0,0,canvas.width,canvas.height); drawFrame(f); }
    }

    /* === PROGRESS CIRCUIT — lit trace + riding signal + node states === */
    if(totLen>0){
      let li=0;
      for(let i=CHAPTERS.length-1;i>=0;i--){ if(p>=CHAPTERS[i]-0.001){ li=i; break; } }
      const segT=(li>=CHAPTERS.length-1)?1:rng(p,CHAPTERS[li],CHAPTERS[li+1]);
      const len=nodeLen[li]+(nodeLen[Math.min(li+1,CHAPTERS.length-1)]-nodeLen[li])*segT;
      litPath.style.strokeDashoffset=(totLen-len);
      if(signalEl){
        const pt=litPath.getPointAtLength(len);
        signalEl.setAttribute('transform','translate('+pt.x+' '+pt.y+')');
        /* dot rides only mid-journey: appears on first scroll, fades out as
           the signal is "delivered" to the final node */
        signalEl.style.opacity=(p>0.01&&p<0.93)?'1':'0';
      }
      nodeEls.forEach(function(n,i){
        if(!n) return;
        n.classList.toggle('on', i<=li);
        n.classList.toggle('cur', i===li);
      });
    }

    /* === DOCTOR IDENTITY — parallax up === */
    if(heroBot){
      const shift = ease(rng(p,0,0.44)) * (body.clientHeight + 80);
      heroBot.style.transform = 'translateY(-'+shift+'px)';
    }

    /* === SCENE 1: HERO (0.08 → 0.22) === */
    const heroO=ease(1-rng(p,0.08,0.22));
    setO(heroScene,heroO);
    setPE(heroScene,heroO>0.04);
    if(hintEl) hintEl.style.opacity=Math.max(0,1-p/0.07);

    /* === SCENE 2: LITECAST (0.18 → 0.58) === */
    const lcO=Math.min(ease(rng(p,0.18,0.27)),ease(1-rng(p,0.50,0.58)));
    setO(lcScene,lcO);
    setPE(lcScene,lcO>0.05);
    const lcCards=document.querySelectorAll('.pt-lc-card');
    [[0,0.21,0.29],[1,0.27,0.35],[2,0.33,0.41]].forEach(function(d){
      var c=lcCards[d[0]]; if(!c) return;
      var t=ease(rng(p,d[1],d[2]))*Math.min(1,lcO*4);
      c.style.opacity=t;
      c.style.transform='translateY('+(1-t)*18+'px) scale('+(0.97+0.03*t)+')';
    });

    /* === SCENE 3: ARTICLES (0.52 → 0.82) === */
    const artO=Math.min(ease(rng(p,0.52,0.60)),ease(1-rng(p,0.74,0.82)));
    setO(artScene,artO);
    setPE(artScene,artO>0.05);
    const artItems=document.querySelectorAll('.pt-article-item');
    [[0,0.54,0.62],[1,0.59,0.67],[2,0.64,0.72]].forEach(function(d){
      var c=artItems[d[0]]; if(!c) return;
      var t=ease(rng(p,d[1],d[2]))*Math.min(1,artO*4);
      c.style.opacity=t;
      c.style.transform='translateX('+(1-t)*14+'px) scale('+(0.97+0.03*t)+')';
    });

    /* === SCENE 4: CTA (0.83 → 0.94) === */
    const ctaO=ease(rng(p,0.83,0.94));
    setO(ctaScene,ctaO);
    setPE(ctaScene,ctaO>0.05);
    if(ctaScene) ctaScene.style.transform='translateY('+(1-ctaO)*16+'px)';

    /* === BOTTOM GRADIENT === */
    if(gradBot) gradBot.style.opacity=ease(rng(p,0.62,0.80));
  }

  body.addEventListener('scroll',function(){
    if(!ticking){ ticking=true; requestAnimationFrame(update); }
  },{passive:true});

  window.addEventListener('resize', function(){ resize(); update(); });

  /* initial paint */
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ resize(); update(); }); });
})();
</script>

</body>
</html>
