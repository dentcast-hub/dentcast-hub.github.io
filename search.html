<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>جستجوی سراسری | DentCast</title>
  <style>
    body{
      margin:0;
      font-family: "Vazirmatn", sans-serif;
      background:#f3f5f7;
      color:#0a1a33;
    }
    .wrap{
      max-width: 780px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }
    .box{
      background:#fff;
      border:1px solid rgba(15,23,42,0.10);
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(2,6,23,0.08);
      padding: 18px 16px;
    }
    .title{
      font-weight: 900;
      font-size: 18px;
      margin: 4px 0 12px;
      color:#0b5fff;
      text-align:center;
    }
    .dc-search-input{
      width:100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #d5d9ea;
      background: #f7f8fc;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .dc-filter-list{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .dc-filter-btn{
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid #d3daf1;
      background: #eef3ff;
      color: #0b1d40;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .dc-filter-btn.active{
      background: #0b5fff;
      color:#fff;
      border-color:#0b5fff;
      box-shadow: 0 4px 14px rgba(11,95,255,0.3);
    }
    .dc-results-box{
      margin-top: 10px;
      padding: 10px 10px;
      border-radius: 16px;
      background: #f7f9ff;
      border: 1px solid #e2e6f3;
      display: none;
      max-height: 70vh;
      overflow:auto;
      position: relative;
    }
    .dc-result-item{
      display:block;
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      color:#0b1d40;
      text-decoration:none;
      font-size:14px;
    }
    .dc-result-item:hover{ background:#eef3ff; }

    .dc-close-results{
      position:absolute;
      top: 10px;
      left: 10px;
      width: 28px; height: 28px;
      border:none;
      border-radius:50%;
      background:#fee2e2;
      color:#b91c1c;
      font-size:18px;
      font-weight:700;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
  </style>
  <base target="_self">

    <link rel="stylesheet" href="/dc-theme.css">
<link rel="stylesheet" href="/dc-nav.css">
  <link rel="stylesheet" href="/global-search.css?v=1">
  <script>(function(){var s=localStorage.getItem('dc-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s===null&&d))document.documentElement.setAttribute('data-theme','dark');})()</script>
  <meta property="og:type" content="article">
  <meta property="og:locale" content="fa_IR">
  <meta property="og:site_name" content="DentCast">
  <meta property="og:title" content="جستجوی سراسری | DentCast">
  <meta property="og:description" content="جستجوی سراسری | DentCast">
  <meta property="og:url" content="https://dentcast.org/">
  <meta property="og:image" content="https://dentcast.org/dentcast-cover.webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="جستجوی سراسری | DentCast">
  <meta name="twitter:description" content="جستجوی سراسری | DentCast">
  <meta name="twitter:image" content="https://dentcast.org/dentcast-cover.webp">
  <meta name="robots" content="index, follow, max-image-preview:large">
</head>
<body>
<!-- DC NAV: TOP BAR -->
<header class="dc-topbar">
  <div class="dc-topbar-actions">
    <a href="/" aria-label="صفحه اصلی دنت‌کست" style="display:flex;align-items:center;margin-left:8px;flex-shrink:0;"><img src="/logo-v2.png" alt="DentCast" width="38" height="38" style="display:block;object-fit:contain;"></a>
    <button class="dc-topbar-btn" id="btn-toolbar-toggle" aria-label="ابزارها" aria-expanded="false">☰</button>
    <button class="dc-topbar-btn" id="btn-radar-topbar" aria-label="رادار">📡</button>
    <button class="dc-topbar-btn dcOpenSearch" aria-label="جستجو">🔍</button>
  </div>
  <div class="dc-topbar-brand">
    <div class="dc-topbar-brand-name">DentCast</div>
    <a href="/about.html" class="dc-topbar-brand-sub">دکتر فواد شهابیان ↗</a>
  </div>
</header>
<div id="dcToolbarDrawer" class="dc-toolbar-drawer" aria-hidden="true">
  <div class="dc-toolbar-drawer-inner">
    <span class="dc-toolbar-drawer-label">ابزارها</span>
    <button class="dc-drawer-tool-seg" type="button" id="tool-pwa"><span class="dc-drawer-tool-ico">📱</span><span class="dc-drawer-tool-txt">نصب</span></button>
    <button class="dc-drawer-tool-seg" type="button" id="tool-consult"><span class="dc-drawer-tool-ico">📧</span><span class="dc-drawer-tool-txt">مشاوره</span></button>
    <button class="dc-drawer-tool-seg" type="button" id="tool-about"><span class="dc-drawer-tool-ico">✨</span><span class="dc-drawer-tool-txt">درباره</span></button>
  </div>
</div>
<div id="dcRadarOverlay" class="radar-overlay" aria-hidden="true">
  <div class="radar-overlay-header">
    <button id="dcCloseRadarOverlay" class="radar-close-btn">&times;</button>
    <div class="radar-header-title">رادار دنت‌کست (جایگزین گوگل)</div>
  </div>
  <div class="radar-overlay-body">
    <div class="radar-search-box">
      <input type="text" id="dcRadarInput" placeholder="نام سایت، زمینه فعالیت یا کلمه کلیدی..." autocomplete="off">
    </div>
    <div id="dcRadarResults" class="radar-results">
      <div class="radar-initial-msg">برای جستجو در بین سایت‌های دندانپزشکی، تایپ کنید...</div>
    </div>
  </div>
</div>

  <div class="wrap">
    <div class="box">
      <div class="title">جستجوی سراسری دنت‌کست</div>

      <input id="dcSearch" class="dc-search-input" placeholder="جستجو در همهٔ بخش‌ها…" />

      <div class="dc-filter-list">
        <button class="dc-filter-btn active" data-type="dentcast">دنت‌کست</button>
        <button class="dc-filter-btn active" data-type="notecast">نوت‌کست</button>
        <button class="dc-filter-btn active" data-type="clinical">نکات کلینیکی</button>
        <button class="dc-filter-btn active" data-type="litecast">لایت‌کست</button>
        <button class="dc-filter-btn active" data-type="photocast">فوتوکست</button>
        <button class="dc-filter-btn active" data-type="dentcast_plus">ویدیوها</button>
        <button class="dc-filter-btn active" data-type="dentai">مقالات</button>
      </div>

      <div class="dc-results-box" id="dcResults">
        <button class="dc-close-results" aria-label="بستن">×</button>
      </div>
    </div>
  </div>
  <script>
    // بستن نتایج
    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("dc-close-results")) {
        const box = document.getElementById("dcResults");
        if (box) box.style.display = "none";
      }
    }, true);
  </script>
<div class="dc-global-filter-box" id="dcGlobalBox">
  <button class="dc-close-results">✖</button>
  <h3 class="dc-global-filter-title">جستجوی سراسری دنت‌کست</h3>
  <input id="dcSearch" class="dc-search-input" placeholder="جستجو در همهٔ بخش‌های دنت‌کست…">
  <div class="dc-filter-list">
    <button class="dc-filter-btn active" data-type="dentcast">دنت‌کست</button>
    <button class="dc-filter-btn active" data-type="notecast">نوت‌کست</button>
    <button class="dc-filter-btn active" data-type="clinical">نکات کلینیکی</button>
    <button class="dc-filter-btn active" data-type="dentcast_plus">ویدیوها</button>
    <button class="dc-filter-btn active" data-type="dentai">مقالات</button>
    <button class="dc-filter-btn active" data-type="meta">metanote</button>
    <button class="dc-filter-btn active" data-type="chairside">chairside</button>
    <button class="dc-filter-btn active" data-type="sharehub">Share Hub</button>
  </div>
  <div class="dc-results-box" id="dcResults"></div>
</div>
<script src="/dc-nav.js" defer></script>
</body>
</html>
