name: Deploy to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get install -y rsync sshpass

      - name: Test SSH connection
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -v -o StrictHostKeyChecking=no \
            root@${{ secrets.VPS_HOST }} "echo SSH_OK"

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            ./ root@${{ secrets.VPS_HOST }}:/var/www/dentcast/
          echo "✅ Deploy complete"
