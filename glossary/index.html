  <style>
:root{
  --pr:#022360; --pr-rgb:2,35,96;
  --ac:#0b5fff; --ac-rgb:11,95,255;
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface2:#f4f6fb;
  --surface3:#eaecf5;
  --border:rgba(2,35,96,.10);
  --border2:rgba(2,35,96,.06);
  --txt:#0a1a33;
  --txt2:#4a5f85;
  --txt3:#8a9cbe;
  --card-bg:#ffffff;
  --card-border:rgba(2,35,96,.09);
  --card-sh:0 1px 3px rgba(2,35,96,.07),0 4px 14px rgba(2,35,96,.04);
  --card-sh2:0 4px 18px rgba(2,35,96,.13),0 1px 4px rgba(2,35,96,.07);
  --tr:.17s cubic-bezier(.4,0,.2,1);
  --tr2:.26s cubic-bezier(.4,0,.2,1);
  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-f:999px;
}
[data-theme="dark"]{
  --pr:#5b9cf6; --pr-rgb:91,156,246;
  --ac:#5b9cf6; --ac-rgb:91,156,246;
  --bg:#0e1621;
  --surface:#17212b; --surface2:#1e2c3a; --surface3:#232e3c;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.04);
  --txt:#e8f0ff; --txt2:#8aaac8; --txt3:#4a6a88;
  --card-bg:#1e2c3a; --card-border:rgba(255,255,255,.07);
  --card-sh:0 1px 3px rgba(0,0,0,.22),0 4px 14px rgba(0,0,0,.14);
  --card-sh2:0 4px 18px rgba(0,0,0,.28);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;width:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  font-size:16px; line-height:1.5;
  background:var(--bg); color:var(--txt);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  touch-action:pan-y;
  transition:background var(--tr2),color var(--tr2);
}
a{color:inherit;text-decoration:none;}

.page{
  max-width:680px;
  margin:0 auto;
  padding:0 14px 60px;
}

/* ── STICKY TOP ── */
.top{
  position:sticky; top:0; z-index:20;
  padding:12px 0 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 10px rgba(var(--pr-rgb),.06);
  transition:background var(--tr2),border-color var(--tr2);
}

.nav-back{ margin-bottom:8px; }
.back-link{
  display:inline-flex; align-items:center; gap:4px;
  font-size:.78rem; font-weight:600;
  color:var(--txt3);
  transition:color var(--tr);
}
.back-link::before{ content:"← "; }
.back-link:hover{ color:var(--ac); }

.hero{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }

.title{
  font-size:1.1rem; font-weight:900;
  color:var(--pr);
  display:flex; gap:8px; align-items:center;
  transition:color var(--tr2);
}
.title .dot{
  width:9px; height:9px; border-radius:var(--r-f);
  background:var(--ac);
  box-shadow:0 0 0 4px rgba(var(--ac-rgb),.15);
  flex-shrink:0;
}
.subtitle{
  color:var(--txt3); font-size:.80rem; line-height:1.6;
  transition:color var(--tr2);
}

/* سرچ */
.searchWrap{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:8px 10px;
  display:flex; gap:10px; align-items:center;
  transition:all var(--tr2);
}
.searchWrap:focus-within{
  border-color:rgba(var(--ac-rgb),.35);
  box-shadow:0 0 0 3px rgba(var(--ac-rgb),.08);
}
.searchIcon{
  width:34px; height:34px;
  border-radius:var(--r-md);
  background:rgba(var(--ac-rgb),.08);
  border:1px solid rgba(var(--ac-rgb),.18);
  display:grid; place-items:center;
  flex-shrink:0; color:var(--ac);
  font-weight:900; font-size:16px;
  transition:all var(--tr2);
}
#search{
  width:100%; border:0; outline:0;
  background:transparent; color:var(--txt);
  font-size:14px; font-family:inherit;
  padding:6px 4px;
}
#search::placeholder{ color:var(--txt3); }

.metaRow{
  display:flex; justify-content:space-between;
  align-items:center; gap:10px;
  margin-top:8px; font-size:.76rem;
}
.chip{
  padding:5px 10px; border-radius:var(--r-f);
  border:1px solid var(--border);
  background:var(--surface2);
  font-size:.72rem; color:var(--txt3);
  user-select:none; white-space:nowrap;
  transition:all var(--tr2);
}

/* alpha nav */
.alphaNav{
  margin-top:8px;
  display:flex; gap:6px;
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:4px 2px 2px;
}
.alphaNav::-webkit-scrollbar{ display:none; }

.alphaBtn{
  flex:0 0 auto; min-width:32px; height:32px;
  border-radius:var(--r-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  display:grid; place-items:center;
  font-weight:700; font-size:.80rem;
  color:var(--txt2); cursor:pointer;
  user-select:none;
  transition:all var(--tr);
}
.alphaBtn:active{ transform:scale(.95); }
.alphaBtn.disabled{ opacity:.3; cursor:default; }
.alphaBtn.active{
  background:rgba(var(--ac-rgb),.12);
  border-color:rgba(var(--ac-rgb),.30);
  color:var(--ac);
}

/* ── LIST WRAP ── */
.listWrap{
  margin-top:12px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:var(--card-sh);
  transition:all var(--tr2);
}

.sectionHeader{
  display:flex; justify-content:space-between;
  align-items:center; gap:10px;
  padding:10px 14px;
  background:var(--surface2);
  border-bottom:1px solid var(--border2);
  transition:background var(--tr2);
}
.sectionHeader h2{
  margin:0; font-size:.82rem; font-weight:800;
  color:var(--txt2); letter-spacing:.04em;
  display:flex; align-items:center; gap:8px;
  transition:color var(--tr2);
}
.sectionHeader .badge{
  font-size:.68rem; color:var(--txt3);
  border:1px solid var(--border);
  background:var(--surface);
  padding:3px 8px; border-radius:var(--r-f);
  transition:all var(--tr2);
}

.items{ padding:8px 6px 10px; }

.term{
  display:flex; justify-content:space-between;
  align-items:center; gap:10px;
  padding:10px 12px; margin:4px 4px;
  border-radius:var(--r-md);
  background:var(--surface2);
  border:1px solid var(--border2);
  transition:all var(--tr);
  -webkit-tap-highlight-color:transparent;
}
.term:hover{
  background:var(--surface3);
  border-color:var(--border);
  transform:translateX(-2px);
}
.term:active{ transform:scale(.99); }

.term .left{
  display:flex; flex-direction:column;
  gap:2px; min-width:0;
}
.en{
  font-weight:700; font-size:.88rem; color:var(--txt);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:color var(--tr2);
}
.fa{
  color:var(--txt3); font-size:.78rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:color var(--tr2);
}
.arrow{
  width:30px; height:30px; border-radius:var(--r-sm);
  display:grid; place-items:center;
  background:rgba(var(--ac-rgb),.08);
  border:1px solid rgba(var(--ac-rgb),.18);
  color:var(--ac); flex-shrink:0;
  font-weight:900; font-size:16px;
  transition:all var(--tr2);
}

.empty{
  padding:24px 16px; color:var(--txt3);
  font-size:.86rem; line-height:1.9; text-align:center;
}

section[id^="sec-"]{ scroll-margin-top:160px; }
@media(max-width:640px){
  section[id^="sec-"]{ scroll-margin-top:120px; }
}

/* فوتر */
.footer{
  margin-top:16px; padding:14px 6px 0;
  color:var(--txt3); font-size:.76rem;
  display:flex; justify-content:space-between;
  align-items:center; gap:12px; flex-wrap:wrap;
  transition:color var(--tr2);
}
.footer a{
  color:var(--txt3);
  border-bottom:1px dotted var(--border);
  transition:color var(--tr);
}
.footer a:hover{ color:var(--ac); }

@media(max-width:640px){
  .footer{
    margin-top:24px; padding:18px 12px 28px;
    flex-direction:column; justify-content:center;
    align-items:center; gap:10px;
    text-align:center; border-top:1px solid var(--border);
  }
  .footer a{
    display:inline-block; padding:6px 14px;
    border-radius:var(--r-f);
    background:var(--surface2); border:1px solid var(--border);
  }
}

/* تم تاگل */
#dc-theme-toggle{
  position:fixed; bottom:20px; left:14px; z-index:250;
  width:42px; height:42px; border-radius:var(--r-f);
  background:#17212b; color:#e8f0ff;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 16px rgba(0,0,0,.28);
  display:flex; align-items:center; justify-content:center;
  font-size:19px; cursor:pointer;
  transition:all var(--tr);
}
#dc-theme-toggle:active{ transform:scale(.86); }

  <script>
const themeBtn = document.getElementById('dc-theme-toggle');
function applyTheme(dark){
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.innerHTML = dark ? '<svg class=\"dc-svg-icon\" viewBox=\"0 0 24 24\" aria-hidden=\"true\" style=\"width:1em;height:1em;vertical-align:-.15em;display:inline-block\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M12 2v2\"/><path d=\"M12 20v2\"/><path d=\"m4.93 4.93 1.41 1.41\"/><path d=\"m17.66 17.66 1.41 1.41\"/><path d=\"M2 12h2\"/><path d=\"M20 12h2\"/><path d=\"m6.34 17.66-1.41 1.41\"/><path d=\"m19.07 4.93-1.41 1.41\"/></svg>' : '<svg class=\"dc-svg-icon\" viewBox=\"0 0 24 24\" aria-hidden=\"true\" style=\"width:1em;height:1em;vertical-align:-.15em;display:inline-block\"><path d=\"M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z\"/></svg>';
  localStorage.setItem('dc-theme', dark ? 'dark' : 'light');
}
(function(){
  const s = localStorage.getItem('dc-theme');
  const d = window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyTheme(s === 'dark' || (s === null && d));
})();
themeBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
});
  </script>

  <script>
    const GLOSSARY_JSON_URL = "glossary.json";

    const elListWrap = document.getElementById("listWrap");
    const elSearch = document.getElementById("search");
    const elCountChip = document.getElementById("countChip");
    const elAlphaNav = document.getElementById("alphaNav");

    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function normalize(str){
      return (str || "").toString().trim().toLowerCase().replace(/\s+/g, " ");
    }

    function getFirstLetter(title){
      const t = (title || "").trim();
      const m = t.match(/[A-Za-z]/);
      return m ? m[0].toUpperCase() : "#";
    }

    function escapeHTML(s){
      return (s || "").replace(/[&<>"']/g, ch => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[ch]));
    }

    function debounce(fn, wait=120){
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    }

    function sortAZ(items){
      return items.slice().sort((a,b)=>{
        const A = (a.title || "").toLowerCase();
        const B = (b.title || "").toLowerCase();
        if (A < B) return -1;
        if (A > B) return 1;
        return 0;
      });
    }

    function buildAlphaNav(enabledLetters){
      elAlphaNav.innerHTML = "";
      ALPHABET.forEach(letter => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "alphaBtn" + (enabledLetters.has(letter) ? "" : " disabled");
        btn.textContent = letter;
        if (enabledLetters.has(letter)) {
          btn.addEventListener("click", () => {
            const target = document.getElementById("sec-" + letter);
            if (!target) return;
            const topBar = document.querySelector(".top");
            const offset = topBar ? topBar.offsetHeight + 8 : 0;
            const y = target.getBoundingClientRect().top + window.pageYOffset - offset;
            window.scrollTo({ top: y, behavior: "smooth" });
            [...elAlphaNav.querySelectorAll(".alphaBtn")].forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            setTimeout(() => btn.classList.remove("active"), 1200);
          });
        } else {
          btn.setAttribute("aria-disabled", "true");
        }
        elAlphaNav.appendChild(btn);
      });
    }

    function renderSections(items){
      if (!items.length){
        elListWrap.innerHTML = `<div class="empty">موردی پیدا نشد. <br>املا رو چک کنید یا عبارت کوتاه‌تری بزنید.</div>`;
        elCountChip.textContent = "۰ عنوان";
        buildAlphaNav(new Set());
        return;
      }
      const grouped = new Map();
      for (const it of items){
        const letter = getFirstLetter(it.title);
        if (!grouped.has(letter)) grouped.set(letter, []);
        grouped.get(letter).push(it);
      }
      const lettersInData = new Set([...grouped.keys()].filter(k=>k !== "#"));
      const orderedKeys = [
        ...ALPHABET.filter(l => grouped.has(l)),
        ...[...grouped.keys()].filter(k => !ALPHABET.includes(k)).sort()
      ];
      elListWrap.innerHTML = "";
      let total = 0;
      for (const key of orderedKeys){
        const arr = grouped.get(key) || [];
        total += arr.length;
        const section = document.createElement("section");
        section.id = "sec-" + key;
        const header = document.createElement("div");
        header.className = "sectionHeader";
        header.innerHTML = `<h2>${escapeHTML(key)} <span class="badge">${arr.length}</span></h2><span class="badge">A–Z</span>`;
        const itemsDiv = document.createElement("div");
        itemsDiv.className = "items";
        for (const it of arr){
          const a = document.createElement("a");
          a.className = "term";
          a.href = it.url;
          a.innerHTML = `<div class="left"><div class="en">${escapeHTML(it.title)}</div><div class="fa">${escapeHTML(it.fa_title)}</div></div><div class="arrow">›</div>`;
          itemsDiv.appendChild(a);
        }
        section.appendChild(header);
        section.appendChild(itemsDiv);
        elListWrap.appendChild(section);
      }
      elCountChip.textContent = total.toLocaleString("fa-IR") + " عنوان";
      buildAlphaNav(lettersInData);
    }

    let ALL = [];

    async function init(){
      try{
        const res = await fetch(GLOSSARY_JSON_URL, {cache:"no-store"});
        if(!res.ok) throw new Error("Failed to load glossary.json");
        const data = await res.json();
        const list = Array.isArray(data.glossary) ? data.glossary : [];
        ALL = sortAZ(list).map(it => ({
          slug: it.slug || "",
          title: it.title || "",
          fa_title: it.fa_title || "",
          url: it.url || "#"
        }));
        renderSections(ALL);
      } catch(e){
        elListWrap.innerHTML = `<div class="empty">خطا در بارگذاری glossary.json <br>مطمئن شوید فایل در مسیر <b>/glossary/glossary.json</b> وجود دارد.</div>`;
        elCountChip.textContent = "—";
        buildAlphaNav(new Set());
      }
    }

    const onSearch = debounce(()=>{
      const q = normalize(elSearch.value);
      if(!q){ renderSections(ALL); return; }
      const filtered = ALL.filter(it=>{
        const en = normalize(it.title);
        const fa = normalize(it.fa_title);
        const slug = normalize(it.slug);
        return en.includes(q) || fa.includes(q) || slug.includes(q);
      });
      renderSections(filtered);
    }, 120);

    elSearch.addEventListener("input", onSearch);
    init();

    (function enableGlobalHorizontalSwipeForAlphaNav(){
      const nav = document.getElementById("alphaNav");
      const wrap = document.getElementById("listWrap");
      const search = document.getElementById("search");
      if (!nav || !wrap) return;
      let startX=0, startY=0, startScrollLeft=0, swiping=false, moved=false, suppressClickUntil=0;
      const THRESHOLD=10, SPEED=1.0;
      document.addEventListener("click", (e) => {
        if (Date.now() < suppressClickUntil){ e.preventDefault(); e.stopPropagation(); }
      }, true);
      function isInsideSearch(e){ return e.target === search || (search && search.contains(e.target)); }
      function onStart(e){
        if (!e.touches || e.touches.length !== 1) return;
        if (isInsideSearch(e)) return;
        const t = e.touches[0];
        startX=t.clientX; startY=t.clientY;
        startScrollLeft=nav.scrollLeft; swiping=false; moved=false;
      }
      function onMove(e){
        if (!e.touches || e.touches.length !== 1) return;
        if (isInsideSearch(e)) return;
        const t=e.touches[0];
        const dx=t.clientX-startX, dy=t.clientY-startY;
        if (!swiping){
          if (Math.abs(dy)>Math.abs(dx) && Math.abs(dy)>THRESHOLD) return;
          if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>THRESHOLD){ swiping=true; } else { return; }
        }
        moved=true;
        e.preventDefault();
        nav.scrollLeft=startScrollLeft-(dx*SPEED);
      }
      function onEnd(){
        if (moved){ suppressClickUntil=Date.now()+350; }
        swiping=false; moved=false;
      }
      wrap.addEventListener("touchstart", onStart, {passive:true});
      wrap.addEventListener("touchmove", onMove, {passive:false});
      wrap.addEventListener("touchend", onEnd, {passive:true});
      wrap.addEventListener("touchcancel", onEnd, {passive:true});
      document.addEventListener("touchstart", onStart, {passive:true});
      document.addEventListener("touchmove", onMove, {passive:false});
      document.addEventListener("touchend", onEnd, {passive:true});
      document.addEventListener("touchcancel", onEnd, {passive:true});
    })();
  </script>
