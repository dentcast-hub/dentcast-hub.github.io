  <style>
    :root{
      --blue:#0b5fff;
      --bg:#0b1220;
      --bg2:#121a2b;
      --text:#e7eaf1;
      --muted:#9aa1b3;
      --radius:18px;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }

    html,body{margin:0; padding:0;}
    body{
      font-family:'Vazirmatn', sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1b2640 0%, transparent 60%),

      margin: 0 auto;
      padding: 40px 22px 90px;
      line-height: 1.9;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;

    h1{
      text-align:center;
      color:var(--blue);
      font-weight:800;
      font-size:2rem;
      margin-bottom:8px;
    }

    h2{
      text-align:center;
      color:#e7eaf1;
      font-weight:600;
      font-size:1.3rem;
      margin-bottom:30px;
    }

    /* ** SEO Change: H4 style to match the original H3 style ** */
    /* Neutral H3 style */
    h3{
      color:var(--text);
      margin-top:30px;
      font-size:1.2rem;
      font-weight:700;
    }

    /* New H4 style (which was the old H3) */
    .text-box h4 {
      color:var(--blue);
      margin-top:30px;
      font-size:1.1rem;
      font-weight:700;
    }

    ul{
      list-style-type:"✦ ";
      padding-right:20px;
      margin:10px 0 20px;
    }

    li{
      margin-bottom:10px;
    }



    .audio-box{
      margin-top:60px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:var(--radius);
      padding:20px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .back{
      display:inline-block;
      margin-top:60px;
      color:var(--blue);
      text-decoration:none;
      font-weight:600;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px;
      padding:10px 20px;
      background:rgba(255,255,255,0.05);
      transition:all .3s ease;
    }

    .back:hover{
      background:rgba(11,95,255,0.15);
      transform:scale(1.03);
    }

    footer{
      margin-top:70px;
      text-align:center;
      color:var(--muted);
      font-size:.9rem;
    }

    /* 📱 بهینه‌سازی موبایل */
    @media (max-width: 768px) {
      body {
        padding: 25px 16px 60px;
        line-height: 1.8;
      }
      h1 {
        font-size: 1.6rem;
      }
      h2 {
        font-size: 1.1rem;
        margin-bottom: 24px;
      }
      .text-box h4 { /* Mobile style for new H4 */
        font-size: 1rem;
        margin-top: 24px;
      }
      ul {
        padding-right:14px;
        font-size:.95rem;
      }
      .audio-box {
        margin-top:40px;
        padding:16px;
      }
      .back {
        font-size:.9rem;
        padding:8px 16px;
        margin-top:40px;
      }
      footer {
        font-size:.8rem;
        margin-top:50px;
      }
    }
  .text-box {
  background: rgba(245, 245, 245, 0.99); /* شیشه‌ای سفید با شفافیت ۸۵٪ */
  color: #111; /* متن مشکی تیره */
  border-radius: 18px;
  padding: 26px 32px;
  margin: 28px 0;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  backdrop-filter: blur(8px);
  }

.author-note{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:6px 10px;
  margin:2.5rem auto 1rem;
  padding-top:1.25rem;
  border-top:1px solid rgba(120,140,170,0.18);
  color:var(--txt3);
  font-size:.78rem;
}
.author-note .author-link{
  color:var(--txt2);
  font-weight:600;
  text-decoration:none;
}
.author-note .author-link:hover{
  color:var(--ac);
  text-decoration:underline;
  text-underline-offset:3px;
}
.author-note .author-role{
  color:var(--txt3);
}
