/* page background, text colour, the card surface/border/shadow and headings all
   come from dc-theme.css (body:has(.dc-topbar) …). Only the cabinet-specific
   layout + the bits dc-theme doesn't cover are defined here, in design tokens. */

.row input:focus,.row select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(var(--ac-rgb),.15)}
input#q{flex:1;min-width:13.75rem}
.chips{display:flex;gap:0.375rem;flex-wrap:wrap;margin-top:0.625rem}
.chip.x{background:var(--ac);color:#fff;border:1px solid var(--ac);border-radius:var(--r-f);padding:0.25rem 0.75rem;font-size:.78rem;cursor:pointer}
.count{color:var(--txt3);font-size:.78rem;margin:0.875rem 0 0}
main#list{padding:0.375rem 0 1.25rem}
.card{border-radius:var(--r-md);padding:0.875rem 1rem;margin:0.75rem 0}
.title{font-size:.95rem;font-weight:600;margin:0 0 0.3125rem;color:var(--txt)}
.jr{font-size:.72rem;color:var(--txt3);margin:0 0 0.5rem}
.meta{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem}
.badge{font-size:.72rem;color:var(--txt2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:0.125rem 0.5625rem}
.tags{display:flex;gap:0.375rem;flex-wrap:wrap;margin-bottom:0.625rem}
#list .tag{font-size:.74rem;color:var(--ac);cursor:pointer}
#list .tag:hover{text-decoration:underline}
/* #list-scoped so these win over dc-theme's .card a / main a link rules */
#list .act a{display:inline-block;font-size:.78rem;text-decoration:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:0.375rem 0.875rem;margin-right:0.5rem;color:var(--txt);background:var(--surface);transition:all var(--tr)}
#list .act a:hover{background:var(--surface2);text-decoration:none}
#list .act a.dl{background:var(--ac);color:#fff;border-color:var(--ac)}
#list .act a.dl:hover{background:var(--ac);opacity:.9}
#list .act a.nolink{opacity:.4;pointer-events:none}
.more{display:block;margin:1.25rem auto;background:var(--surface);border:1px solid var(--border);color:var(--txt2);border-radius:var(--r-sm);padding:0.5625rem 1.125rem;cursor:pointer;font-family:inherit;font-size:.82rem}
.more:hover{background:var(--surface2)}
.state{padding:2.5rem 0;color:var(--txt3);text-align:center}
#list .state a{color:var(--ac)}

}

.dc-jump{

  opacity:.85;
  transition:opacity .2s ease, transform .2s ease, background var(--tr2);
  cursor:pointer;
  z-index:9999;
}
.dc-jump:hover{ opacity:1; transform:translateY(-1px); }
.dc-jump:active{ transform:scale(.92); }
.dc-jump svg{
  width:1.25rem; height:1.25rem;
  fill:#fff;
  transition:fill var(--tr2), transform .2s ease;
}
.dc-jump.is-up svg{
  transform:rotate(180deg);

<script>
// JSON lives next to this file in the repo. Relative path works on any domain.
const SRC="dentcast_cabinet_full_catalog.json";
let DATA=[],active=new Set(),shown=0;const PAGE=80;
const q=document.getElementById('q'),topic=document.getElementById('topic'),type=document.getElementById('type'),sort=document.getElementById('sort');
const nm=s=>(s||'').toLowerCase();

fetch(SRC).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();}).then(j=>{
  const papers=Array.isArray(j)?j:(j.papers||[]);
  DATA=papers.map(p=>({
    t:p.display_title||p.real_title||p.title||"",
    tp:p.topic||"",ty:p.type||"",tg:p.tags||[],
    d:p.drive_download||"",v:p.drive_view||"",j:p.journal||""
  }));
  document.getElementById('total').textContent='\u00b7 '+DATA.length+' papers';
  fill(topic,[...new Set(DATA.map(p=>p.tp).filter(x=>x&&x!=='(root)'))].sort());
  fill(type,[...new Set(DATA.map(p=>p.ty).filter(Boolean))].sort());
  [q,topic,type].forEach(el=>el.disabled=false);
  [q,topic,type,sort].forEach(el=>el.addEventListener('input',()=>render(true)));
  document.getElementById('state').remove();render(true);
}).catch(e=>{
  document.getElementById('state').innerHTML='Could not load <b>'+SRC+'</b> ('+e.message+').<br>Make sure the JSON sits in the same folder as this page in the repo.';
});

function fill(sel,arr){for(const v of arr){const o=document.createElement('option');o.textContent=v;sel.appendChild(o);}}
function match(p){const t=nm(q.value).trim();
 if(t&&!(nm(p.t).includes(t)||p.tg.some(x=>nm(x).includes(t))))return false;
 if(topic.value&&p.tp!==topic.value)return false;if(type.value&&p.ty!==type.value)return false;
 for(const a of active)if(!p.tg.includes(a))return false;return true;}
function render(reset){if(reset){shown=0;document.getElementById('list').innerHTML='';}
 const res=DATA.filter(match);res.sort((a,b)=>(a[sort.value]||'').localeCompare(b[sort.value]||''));
 document.getElementById('count').textContent=res.length+' result'+(res.length==1?'':'s');
 const list=document.getElementById('list');
 for(const p of res.slice(shown,shown+PAGE)){const d=document.createElement('div');d.className='card';
  const tags=p.tg.map(t=>'<span class="tag" data-t="'+t+'">#'+t+'</span>').join(' ');
  const dl=p.d?'<a class="dl" href="'+p.d+'" target="_blank">Download</a>':'<a class="dl nolink">No link</a>';
  const vw=p.v?'<a href="'+p.v+'" target="_blank">View</a>':'';
  const jr=p.j?'<p class="jr">'+p.j+'</p>':'';
  d.innerHTML='<p class="title">'+p.t+'</p>'+jr+'<div class="meta"><span class="badge">'+p.ty+'</span><span class="badge">'+p.tp+'</span></div><div class="tags">'+tags+'</div><div class="act">'+dl+vw+'</div>';
  list.appendChild(d);}
 shown+=Math.min(PAGE,Math.max(0,res.length-shown));let mb=document.getElementById('more');if(mb)mb.remove();
 if(shown<res.length){const b=document.createElement('button');b.id='more';b.className='more';b.textContent='show more ('+(res.length-shown)+' left)';b.onclick=()=>render(false);list.appendChild(b);}}
function chips(){const c=document.getElementById('active');c.innerHTML='';active.forEach(a=>{const s=document.createElement('span');s.className='chip x';s.textContent='#'+a+' \u2715';s.onclick=()=>{active.delete(a);chips();render(true)};c.appendChild(s);});}
document.addEventListener('click',e=>{if(e.target.classList.contains('tag')){active.add(e.target.dataset.t);chips();render(true);}});
</script>
<!-- Floating jump button (quick scroll) — behavior copied from the landing pages -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("dcJumpBtn");
  const topEl = document.getElementById("dc-top");
  const endEl = document.getElementById("dc-list-end");

  if (!btn) return;

  const BOTTOM_RATIO = 0.85;
  const TOP_RESET = 20;

  let isUp = false;

  function pageHeight() {
    return document.documentElement.scrollHeight;
  }

  function viewportHeight() {
    return window.innerHeight;
  }

  function scrollY() {
    return window.pageYOffset || document.documentElement.scrollTop;
  }

  function nearBottom() {
    return (scrollY() + viewportHeight()) >= pageHeight() * BOTTOM_RATIO;
  }

  function updateState() {

    if (pageHeight() <= viewportHeight() + 10) {
      btn.style.opacity = "0.4";
      return;
    } else {
      btn.style.opacity = ".85";
    }

    isUp = nearBottom();
    btn.classList.toggle("is-up", isUp);


  }

  btn.addEventListener("click", function () {
    if (isUp) {
      if (topEl) {
        topEl.scrollIntoView({ behavior: "smooth" });
      } else {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    } else {
      if (endEl) {
        endEl.scrollIntoView({ behavior: "smooth" });
      } else {
        window.scrollTo({ top: pageHeight(), behavior: "smooth" });
      }
    }
  });

  window.addEventListener("scroll", updateState);
  window.addEventListener("resize", updateState);

  // The catalog list renders asynchronously after fetch — re-check the button
  // state when it changes so it isn't stuck dimmed on first paint.
  const listEl = document.getElementById("list");
  if (listEl) new MutationObserver(updateState).observe(listEl, { childList: true });

  updateState();

});
</script>
